<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0e12">
<title>Maintenance Tracker</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0e12;--sf:#151920;--sa:#1c2029;--ra:#232833;--bd:#2a2f3a;
  --ac:#e89832;--rd:#e05545;--gn:#38b060;--bl:#4090e0;
  --tx:#dce0e8;--td:#7a8090;--tm:#4a5060;--wh:#fff;
  --mono:'JetBrains Mono','Fira Code','SF Mono',monospace;
  --sans:'DM Sans','Segoe UI',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;-webkit-tap-highlight-color:transparent}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

.header{background:var(--sf);border-bottom:2px solid var(--ac);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--ac);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#111;font-family:var(--mono)}
.logo-title{font-size:17px;font-weight:700}
.logo-sub{font-size:10px;color:var(--td);font-family:var(--mono);letter-spacing:1.2px;text-transform:uppercase}

.tabs{display:flex;gap:3px;background:var(--sa);border-radius:7px;padding:3px;flex-wrap:wrap}
.tab{padding:7px 12px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--sans);background:transparent;color:var(--td);transition:all .2s;position:relative}
.tab.active{background:var(--ac);color:#111}
.tab .dot{position:absolute;top:2px;right:2px;width:7px;height:7px;border-radius:50%;background:var(--rd);border:2px solid var(--sa)}

.main{flex:1;padding:16px;max-width:1200px;width:100%;margin:0 auto}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:14px}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:600px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:12px;text-align:center}
.stat-val{font-size:20px;font-weight:800;font-family:var(--mono)}
.stat-label{font-size:10px;color:var(--td);font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}

.filler-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}
.filler-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px;display:flex;flex-direction:column;align-items:center;transition:all .3s}
.filler-card.running{box-shadow:0 0 20px rgba(255,255,255,.05)}
.filler-icon{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;font-family:var(--mono);margin-bottom:6px;transition:all .3s}
.filler-name{font-size:13px;font-weight:700;margin-bottom:4px}
.filler-timer{font-family:var(--mono);font-size:20px;font-weight:800;margin-bottom:2px;letter-spacing:1px}
.filler-since{font-size:10px;color:var(--td);font-family:var(--mono);margin-bottom:8px}
.filler-pulse{width:100%;height:3px;border-radius:2px;background:var(--sa);margin-top:8px;overflow:hidden}
.filler-pulse-bar{height:100%;border-radius:2px;animation:pulse 1.5s ease-in-out infinite;width:100%;opacity:.7}

.btn{padding:10px 18px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--sans);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;width:100%}
.btn-start{background:var(--gn);color:var(--wh)}
.btn-stop{background:var(--rd);color:var(--wh)}
.btn-edit{background:var(--bl);color:var(--wh)}
.btn-delete{background:var(--rd);color:var(--wh)}
.btn-primary{background:var(--ac);color:#111}
.btn-ghost{background:var(--sa);color:var(--td)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:5px}

.event-card{background:var(--sa);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:10px}
.event-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.event-field{margin-bottom:5px;font-size:13px}
.event-field-label{font-size:11px;color:var(--td);font-family:var(--mono);text-transform:uppercase}
.event-actions{display:flex;gap:8px;margin-top:10px;border-top:1px solid var(--bd);padding-top:10px}

.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;font-family:var(--mono)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--mono);margin-right:4px}

.input{width:100%;padding:10px 12px;background:var(--sa);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:14px;font-family:var(--sans);outline:none;box-sizing:border-box}
.input:focus{border-color:var(--ac)}
.textarea{width:100%;padding:10px 12px;background:var(--sa);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:14px;font-family:var(--sans);outline:none;box-sizing:border-box;min-height:70px;resize:vertical}
.label{font-size:11px;font-weight:600;color:var(--td);margin-bottom:4px;display:block;font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow:auto;padding:20px}

.section-title{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}

.part-card{background:var(--sa);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:10px}
.part-photo{width:100%;max-height:200px;object-fit:cover;border-radius:6px;margin-bottom:10px}
.part-info{margin-bottom:4px;font-size:13px}

.empty{text-align:center;padding:36px;color:var(--td);font-size:14px}
.hidden{display:none}

.tech-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;margin-bottom:6px}
.tech-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid var(--bd);background:var(--sa);color:var(--td)}
.tech-chip.selected{background:#4090e030;color:#4090e0;border-color:#4090e050}
.tech-chip.display{cursor:default;background:#4090e020;color:#4090e0;border:none;font-size:10px;padding:2px 8px}
.tech-manage-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--bd)}
.tech-manage-name{flex:1;font-size:15px;font-weight:600}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">MT</div>
    <div>
      <div class="logo-title">Maintenance Tracker</div>
      <div class="logo-sub">Fillers • Downtime • Parts</div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="main" id="main"></div>

<!-- Modal container -->
<div id="modal-root"></div>

<script>
// ═══════════════════════════════════════
// CONFIG & HELPERS
// ═══════════════════════════════════════
var API = "";
var LINES = ["A LINE","B LINE","C LINE","F LINE","G LINE","H LINE","J LINE","K LINE","M LINE","R LINE"];
var FILLER_COLORS = {"A LINE":"#e05545","B LINE":"#e08840","C LINE":"#d4b030","F LINE":"#58b050","G LINE":"#38a8a0","H LINE":"#4090e0","J LINE":"#6870d8","K LINE":"#a060c8","M LINE":"#d060a0","R LINE":"#e06878"};
var TAB_NAMES = ["Dashboard","Today's Log","Parts Catalog","Shift Report","History","Technicians"];

var state = {
  tab: 0, events: [], timers: {}, catalog: [], equipment: [], technicians: [],
  shiftLabel: "", historyDate: today(), searchPart: "", selectedTechs: {}
};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function today(){return new Date().toISOString().slice(0,10)}
function shortTime(ts){if(!ts)return"—";return new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
function timerDisp(ms){if(!ms||ms<0)return"0:00";var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;if(h>0)return h+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");return m+":"+String(sec).padStart(2,"0")}
function durText(n){if(!n&&n!==0)return"—";var h=Math.floor(n/60),m=Math.round(n%60);return h>0?h+"h "+m+"m":m+"m"}
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}

// ═══════════════════════════════════════
// API CALLS
// ═══════════════════════════════════════
async function api(method, path, body) {
  var opts = { method: method, headers: {"Content-Type":"application/json"} };
  if (body) opts.body = JSON.stringify(body);

  var res = await fetch(API + path, opts);
  var text = await res.text();

  if (!res.ok) {
    throw new Error("HTTP " + res.status + " on " + path + ": " + text);
  }

  try {
    return text ? JSON.parse(text) : {};
  } catch (err) {
    throw new Error("Invalid JSON from " + path + ": " + text);
  }
}

async function loadAll() {
  var results = await Promise.all([
    api("GET","/api/events"),
    api("GET","/api/timers"),
    api("GET","/api/catalog"),
    api("GET","/api/equipment")
  ]);
  state.events = results[0].map(function(e){ /* existing mapping */ });
  state.timers = results[1];
  state.catalog = results[2].map(function(p){ /* existing mapping */ });
  state.equipment = results[3];
  state.technicians = [];
}

// ═══════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════
function render() {
  renderTabs();
  var main = document.getElementById("main");
  if (state.tab === 0) renderDashboard(main);
  else if (state.tab === 1) renderTodayLog(main);
  else if (state.tab === 2) renderCatalog(main);
  else if (state.tab === 3) renderShiftReport(main);
  else if (state.tab === 4) renderHistory(main);
  else if (state.tab === 5) renderTechnicians(main);
}

function renderTabs() {
  var active = Object.values(state.timers).filter(function(t){return t.running}).length;
  var html = "";
  TAB_NAMES.forEach(function(name, i) {
    html += '<button class="tab'+(state.tab===i?" active":"")+'" onclick="setTab('+i+')">'+name;
    if (i===0 && active>0) html += '<span class="dot"></span>';
    html += '</button>';
  });
  document.getElementById("tabs").innerHTML = html;
}

function setTab(i){state.tab=i;render()}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════
var timerInterval = null;

function renderDashboard(el) {
  var todayEvts = state.events.filter(function(e){return e.date===today()});
  var totalDown = todayEvts.reduce(function(s,e){return s+(e.durationMin||0)},0);
  var active = Object.values(state.timers).filter(function(t){return t.running}).length;

  var html = '<div class="stat-grid">';
  html += statBox(active, "Active Timers", active>0?"var(--rd)":"var(--tm)");
  html += statBox(todayEvts.length, "Events Today", "var(--ac)");
  html += statBox(durText(totalDown), "Total Downtime", "var(--ac)");
  html += statBox(state.catalog.length, "Parts Tracked", "var(--td)");
  html += '</div>';

  html += '<div class="section-title"><span style="color:var(--ac)">▣</span> Filler Status Board</div>';
  html += '<div class="filler-grid">';
  LINES.forEach(function(f) {
    var t = state.timers[f];
    var on = t && t.running;
    var color = FILLER_COLORS[f];
    var elapsed = on ? Date.now() - t.startTime : 0;
    var selectedForFiller = state.selectedTechs[f] || [];
    var timerTechs = (on && t.techs) ? t.techs : [];

    html += '<div class="filler-card'+(on?" running":"")+'" style="border-color:'+(on?color+"60":"var(--bd)")+'">';
    html += '<div class="filler-icon" style="background:'+(on?color:color+"20")+';color:'+(on?"#fff":color)+'">'+f.charAt(0)+'</div>';
    html += '<div class="filler-name" style="color:'+(on?"var(--wh)":"var(--tx)")+'">'+f+'</div>';
    if (on) {
      html += '<div class="filler-timer" data-filler="'+f+'" style="color:'+color+'">'+timerDisp(elapsed)+'</div>';
      html += '<div class="filler-since">since '+shortTime(t.startTime)+'</div>';
      // Show who's responding
      if (timerTechs.length > 0) {
        html += '<div class="tech-chips" style="justify-content:center;margin-bottom:6px">';
        timerTechs.forEach(function(tc) { html += '<span class="tech-chip display">'+esc(tc.name)+'</span>'; });
        html += '</div>';
      }
      html += '<button class="btn btn-stop" onclick="stopFiller(\''+f+'\')"><span style="width:10px;height:10px;border-radius:2px;background:#fff;display:inline-block"></span> STOP</button>';
      html += '<div class="filler-pulse"><div class="filler-pulse-bar" style="background:'+color+'"></div></div>';
    } else {
      html += '<div class="filler-timer" style="color:var(--tm)">—:——</div>';
      html += '<div class="filler-since">idle</div>';
      // Tech picker before start
      if (state.technicians.length > 0) {
        html += '<div style="width:100%;margin-bottom:6px"><div style="font-size:10px;color:var(--td);font-family:var(--mono);text-transform:uppercase;margin-bottom:3px;text-align:left">Responding:</div>';
        html += '<div class="tech-chips">';
        state.technicians.forEach(function(tc) {
          var sel = selectedForFiller.indexOf(tc.id) >= 0;
          html += '<span class="tech-chip'+(sel?" selected":"")+'" onclick="toggleFillerTech(\''+f+'\',\''+tc.id+'\')">'+esc(tc.name)+'</span>';
        });
        html += '</div></div>';
      }
      html += '<button class="btn btn-start" onclick="startFiller(\''+f+'\')"><span style="width:0;height:0;border-left:8px solid white;border-top:5px solid transparent;border-bottom:5px solid transparent;display:inline-block"></span> START</button>';
    }
    html += '</div>';
  });
  html += '</div>';

  // Recent events
  if (todayEvts.length > 0) {
    html += '<div class="card" style="margin-top:16px"><div class="section-title">Recent Events Today</div>';
    todayEvts.slice(0,5).forEach(function(e){html += eventCardHTML(e, true)});
    html += '</div>';
  }

  el.innerHTML = html;
  startTimerTick();
}

function statBox(val, label, color) {
  return '<div class="stat"><div class="stat-val" style="color:'+color+'">'+val+'</div><div class="stat-label">'+label+'</div></div>';
}

function startTimerTick() {
  if (timerInterval) clearInterval(timerInterval);
  var hasRunning = Object.values(state.timers).some(function(t){return t.running});
  if (!hasRunning) return;
  timerInterval = setInterval(function() {
    FILLERS.forEach(function(f) {
      var t = state.timers[f];
      if (!t || !t.running) return;
      var el = document.querySelector('[data-filler="'+f+'"]');
      if (el) el.textContent = timerDisp(Date.now() - t.startTime);
    });
  }, 1000);
}

function toggleFillerTech(filler, techId) {
  if (!state.selectedTechs[filler]) state.selectedTechs[filler] = [];
  var arr = state.selectedTechs[filler];
  var idx = arr.indexOf(techId);
  if (idx >= 0) { arr.splice(idx, 1); }
  else { arr.push(techId); }
  render();
}

async function startFiller(f) {
  var techIds = state.selectedTechs[f] || [];
  var result = await api("POST","/api/timers/"+encodeURIComponent(f)+"/start", {techIds: techIds});
  state.timers[f] = result;
  state.selectedTechs[f] = [];
  await loadAll();
  render();
}

async function stopFiller(f) {
  var result = await api("POST","/api/timers/"+encodeURIComponent(f)+"/stop");
  showEventModal(f, result.startTime, result.stopTime, null, result.techIds || []);
}

// ═══════════════════════════════════════
// EVENT CARD HTML
// ═══════════════════════════════════════
function eventCardHTML(e, showDel) {
  var fc = FILLER_COLORS[e.filler] || "#e89832";
  var partsText = (e.parts||[]).map(function(p){return esc(p.name)+(p.qty>1?" ×"+p.qty:"")}).join(", ");
  var html = '<div class="event-card">';
  html += '<div class="event-top">';
  html += '<span class="tag" style="background:'+fc+'18;color:'+fc+'">'+esc(e.filler)+'</span>';
  html += '<span class="badge" style="background:#e8983220;color:#e89832">'+durText(e.durationMin)+'</span>';
  html += '<span style="font-family:var(--mono);font-size:11px;color:var(--td);margin-left:auto">'+shortTime(e.startTime)+' → '+shortTime(e.stopTime)+'</span>';
  html += '</div>';
  if (e.equipmentId) html += '<div class="event-field"><span class="event-field-label">Equipment: </span><strong style="color:var(--ac)">'+esc(e.equipmentId)+'</strong></div>';
  if (e.issue) html += '<div class="event-field"><span class="event-field-label">Issue: </span>'+esc(e.issue)+'</div>';
  if (e.resolution) html += '<div class="event-field"><span class="event-field-label">Fix: </span>'+esc(e.resolution)+'</div>';
  if (partsText) html += '<div class="event-field"><span class="event-field-label">Parts: </span><span style="font-size:12px">'+partsText+'</span></div>';
  var techNames = (e.techs||[]).map(function(t){return esc(t.name)}).join(", ");
  if (techNames) html += '<div class="event-field"><span class="event-field-label">Responded: </span><span style="font-size:12px;color:var(--bl)">'+techNames+'</span></div>';
  html += '<div class="event-actions">';
  html += '<button class="btn btn-edit" style="flex:1" onclick="editEvent(\''+e.id+'\')">✎ Edit</button>';
  if (showDel) html += '<button class="btn btn-delete" style="flex:1" onclick="deleteEvent(\''+e.id+'\')">✕ Delete</button>';
  html += '</div></div>';
  return html;
}

// ═══════════════════════════════════════
// TODAY'S LOG
// ═══════════════════════════════════════
function renderTodayLog(el) {
  var evts = state.events.filter(function(e){return e.date===today()});
  var total = evts.reduce(function(s,e){return s+(e.durationMin||0)},0);
  var html = '<div class="card">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">';
  html += '<div style="font-size:15px;font-weight:700">Today\'s Log — '+today()+'</div>';
  html += '<div style="font-size:12px;color:var(--td)">'+evts.length+' events • '+durText(total)+' total</div></div>';
  if (evts.length === 0) { html += '<div class="empty">No events logged today.</div>'; }
  else { evts.forEach(function(e){html += eventCardHTML(e, true)}); }
  html += '</div>';
  el.innerHTML = html;
}

// ═══════════════════════════════════════
// PARTS CATALOG
// ═══════════════════════════════════════
function renderCatalog(el) {
  var q = state.searchPart.toLowerCase();
  var parts = state.catalog.filter(function(p) {
    if (!q) return true;
    return p.name.toLowerCase().indexOf(q)>=0 || (p.partNumber||"").toLowerCase().indexOf(q)>=0 ||
      (p.fillersUsed||[]).some(function(f){return f.toLowerCase().indexOf(q)>=0}) ||
      (p.equipmentUsed||[]).some(function(e){return e.toLowerCase().indexOf(q)>=0});
  });

  var html = '<div class="card">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">';
  html += '<div style="font-size:15px;font-weight:700">Parts Catalog</div>';
  html += '<div style="font-size:12px;color:var(--td)">'+state.catalog.length+' parts</div></div>';
  html += '<div style="display:flex;gap:8px;margin-bottom:14px">';
  html += '<input class="input" style="flex:1" placeholder="Search parts..." value="'+esc(state.searchPart)+'" oninput="state.searchPart=this.value;render()">';
  html += '<button class="btn btn-primary" style="width:auto;padding:10px 16px;white-space:nowrap" onclick="showAddPartModal()">+ Add Part</button>';
  html += '</div>';

  if (parts.length === 0) {
    html += '<div class="empty">'+(state.catalog.length===0?'No parts yet. Add parts manually or they\'ll be added when you log events.':'No match.')+'</div>';
  } else {
    parts.sort(function(a,b){return(b.usageCount||0)-(a.usageCount||0)});
    parts.forEach(function(p) {
      html += '<div class="part-card">';
      if (p.photoFilename) html += '<img class="part-photo" src="/photos/'+esc(p.photoFilename)+'" alt="'+esc(p.name)+'">';
      html += '<div style="font-size:15px;font-weight:700;margin-bottom:4px">'+esc(p.name)+'</div>';
      if (p.partNumber) html += '<div class="part-info"><span class="event-field-label">Part #: </span><span style="font-family:var(--mono)">'+esc(p.partNumber)+'</span></div>';
      if (p.description) html += '<div class="part-info"><span class="event-field-label">Description: </span>'+esc(p.description)+'</div>';
      if (p.supplier) html += '<div class="part-info"><span class="event-field-label">Supplier: </span>'+esc(p.supplier)+'</div>';
      if (p.location) html += '<div class="part-info"><span class="event-field-label">Location: </span>'+esc(p.location)+'</div>';
      html += '<div class="part-info"><span class="event-field-label">Used: </span><span class="badge" style="background:#38b06020;color:#38b060">'+(p.usageCount||0)+'×</span></div>';
      if ((p.fillersUsed||[]).length>0) {
        html += '<div class="part-info" style="margin-top:4px">';
        (p.fillersUsed||[]).forEach(function(f){var c=FILLER_COLORS[f]||"#e89832";html+='<span class="tag" style="background:'+c+'18;color:'+c+'">'+esc(f)+'</span>'});
        html += '</div>';
      }
      html += '<div class="event-actions">';
      html += '<button class="btn btn-edit" style="flex:1" onclick="showEditPartModal(\''+p.id+'\')">✎ Edit</button>';
      html += '<button class="btn btn-delete" style="flex:1" onclick="deleteCatalogPart(\''+p.id+'\')">✕ Delete</button>';
      html += '</div></div>';
    });
  }
  html += '</div>';
  el.innerHTML = html;
}

function renderShiftReport(el) {

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">';
  html += '<div><label class="label">Date</label><input class="input" type="date" value="'+today()+'" disabled></div>';
  html += '<div><label class="label">Shift Label</label><input class="input" id="shift-label" placeholder="e.g. 2nd Shift" value="'+esc(state.shiftLabel)+'" oninput="state.shiftLabel=this.value"></div>';
  html += '</div>';
  html += '<div style="background:var(--sa);border-radius:8px;padding:14px;margin-bottom:16px">';
  html += '<div style="font-size:12px;font-weight:700;margin-bottom:8px">Preview — '+evts.length+' events, '+durText(total)+' downtime</div>';
  if (evts.length===0) html += '<div style="color:var(--tm);font-size:12px">No events yet.</div>';

    var fc=FILLER_COLORS[e.filler]||"#e89832";
    html+='<div style="font-size:12px;padding:5px 0;'+(i>0?'border-top:1px solid var(--bd);':'')+'">';
    html+='<span class="tag" style="background:'+fc+'18;color:'+fc+'">'+esc(e.filler)+'</span> ';
    html+='<span style="font-family:var(--mono);font-size:11px;color:var(--td)">'+durText(e.durationMin)+'</span> ';

  });
  html += '</div>';
  html += '<button class="btn btn-primary" '+(evts.length===0?'disabled style="opacity:.5"':'')+' onclick="printReport()">Print / Save as PDF</button>';
  html += '</div>';
  el.innerHTML = html;
}

// ═══════════════════════════════════════
// EVENT MODAL
// ═══════════════════════════════════════
var modalParts = [];
var modalTechIds = [];

function showEventModal(filler, startTime, stopTime, existingEvent, preselectedTechIds) {
  var isEdit = !!existingEvent;
  var durMs = stopTime - startTime;
  var durMins = Math.round(durMs / 60000);
  var fc = FILLER_COLORS[filler] || "#e89832";

  if (isEdit) {
    modalParts = (existingEvent.parts||[]).map(function(p){return{id:p.id||uid(),name:p.name,partNumber:p.partNumber||"",qty:p.qty||1}});
    modalTechIds = (existingEvent.techs||[]).map(function(t){return t.id});
  } else {
    modalParts = [];
    modalTechIds = preselectedTechIds || [];
  }

  var html = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">';
  html += '<div class="modal">';
  html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">';
  html += '<div style="width:10px;height:10px;border-radius:50%;background:'+fc+'"></div>';
  html += '<div style="font-size:17px;font-weight:700">'+esc(filler)+' — '+(isEdit?'Edit Event':'Downtime Details')+'</div></div>';

  html += '<div style="background:var(--sa);border-radius:8px;padding:14px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center">';
  html += '<div><div class="label" style="margin:0">Started</div><div style="font-size:15px;font-weight:700;font-family:var(--mono);margin-top:2px">'+shortTime(startTime)+'</div></div>';
  html += '<div><div class="label" style="margin:0">Stopped</div><div style="font-size:15px;font-weight:700;font-family:var(--mono);margin-top:2px">'+shortTime(stopTime)+'</div></div>';
  html += '<div><div class="label" style="margin:0">Duration</div><div style="font-size:15px;font-weight:800;font-family:var(--mono);margin-top:2px;color:'+fc+'">'+durText(durMins)+'</div></div>';
  html += '</div>';

  // Tech picker
  html += '<div style="margin-bottom:14px"><label class="label">Who Responded</label>';
  html += '<div class="tech-chips" id="modal-techs">';
  state.technicians.forEach(function(tc) {
    var sel = modalTechIds.indexOf(tc.id) >= 0;
    html += '<span class="tech-chip'+(sel?" selected":"")+'" onclick="toggleModalTech(\''+tc.id+'\')">'+esc(tc.name)+'</span>';
  });
  if (state.technicians.length === 0) html += '<span style="font-size:12px;color:var(--tm)">No technicians added yet. Go to Technicians tab to add.</span>';
  html += '</div></div>';

  html += '<div style="margin-bottom:14px"><label class="label">Equipment ID / Component</label>';
  html += '<input class="input" id="modal-eq" placeholder="e.g. CONV-101, Motor #3" value="'+esc(isEdit?existingEvent.equipmentId||"":"")+'">';
  html += '</div>';
  html += '<div style="margin-bottom:14px"><label class="label">Issue Description</label>';
  html += '<textarea class="textarea" id="modal-issue" placeholder="What was wrong?">'+(isEdit?esc(existingEvent.issue||""):"")+'</textarea></div>';
  html += '<div style="margin-bottom:14px"><label class="label">Resolution / Fix</label>';
  html += '<textarea class="textarea" id="modal-reso" placeholder="What did you do to fix it?">'+(isEdit?esc(existingEvent.resolution||""):"")+'</textarea></div>';

  html += '<div style="margin-bottom:16px"><label class="label">Parts Used</label>';
  html += '<div id="modal-parts"></div>';
  html += '<button class="btn btn-ghost btn-sm" style="width:auto;margin-top:6px" onclick="addModalPart()">+ Add Part</button></div>';

  html += '<div style="display:flex;gap:10px">';
  html += '<button class="btn btn-ghost" style="flex:1" onclick="closeModal()">'+(isEdit?'Cancel':'Discard')+'</button>';
  var saveAction = isEdit ?
    'saveEditedEvent(\''+existingEvent.id+'\',\''+filler+'\','+startTime+','+stopTime+','+durMins+',\''+existingEvent.date+'\',\''+existingEvent.timestamp+'\')' :
    'saveNewEvent(\''+filler+'\','+startTime+','+stopTime+','+durMins+')';
  html += '<button class="btn btn-primary" style="flex:1" onclick="'+saveAction+'">'+(isEdit?'Update Event':'Save Event')+'</button>';
  html += '</div></div></div>';

  document.getElementById("modal-root").innerHTML = html;
  renderModalParts();
}

function toggleModalTech(techId) {
  var idx = modalTechIds.indexOf(techId);
  if (idx >= 0) { modalTechIds.splice(idx, 1); }
  else { modalTechIds.push(techId); }
  // Re-render just the tech chips
  var container = document.getElementById("modal-techs");
  if (!container) return;
  var html = "";
  state.technicians.forEach(function(tc) {
    var sel = modalTechIds.indexOf(tc.id) >= 0;
    html += '<span class="tech-chip'+(sel?" selected":"")+'" onclick="toggleModalTech(\''+tc.id+'\')">'+esc(tc.name)+'</span>';
  });
  container.innerHTML = html;
}

function renderModalParts() {
  var el = document.getElementById("modal-parts");
  if (!el) return;
  var html = "";
  modalParts.forEach(function(p, i) {
    html += '<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">';
    html += '<input class="input" style="flex:2" placeholder="Part name" value="'+esc(p.name)+'" oninput="modalParts['+i+'].name=this.value">';
    html += '<input class="input" style="flex:1.2" placeholder="Part #" value="'+esc(p.partNumber)+'" oninput="modalParts['+i+'].partNumber=this.value">';
    html += '<input class="input" style="flex:.4;text-align:center" type="number" min="1" value="'+p.qty+'" oninput="modalParts['+i+'].qty=parseInt(this.value)||1">';
    html += '<button class="btn btn-delete btn-sm" style="width:auto;flex:none" onclick="modalParts.splice('+i+',1);renderModalParts()">✕</button>';
    html += '</div>';
  });
  el.innerHTML = html;
}

function addModalPart() {
  modalParts.push({id:uid(),name:"",partNumber:"",qty:1});
  renderModalParts();
}

async function saveNewEvent(filler, startTime, stopTime, durMins) {
  var ev = {
    id: uid(), filler: filler,
    equipmentId: document.getElementById("modal-eq").value.trim(),
    issue: document.getElementById("modal-issue").value.trim(),
    resolution: document.getElementById("modal-reso").value.trim(),
    startTime: startTime, stopTime: stopTime, durationMin: durMins,
    parts: modalParts.filter(function(p){return p.name.trim()}),
    techIds: modalTechIds.slice(),
    date: today(), timestamp: new Date().toISOString()
  };
  await api("POST", "/api/events", ev);
  closeModal();
  await loadAll();
  render();
}

async function saveEditedEvent(id, filler, startTime, stopTime, durMins, date, timestamp) {
  var ev = {
    id: id, filler: filler,
    equipmentId: document.getElementById("modal-eq").value.trim(),
    issue: document.getElementById("modal-issue").value.trim(),
    resolution: document.getElementById("modal-reso").value.trim(),
    startTime: startTime, stopTime: stopTime, durationMin: durMins,
    parts: modalParts.filter(function(p){return p.name.trim()}),
    techIds: modalTechIds.slice(),
    date: date, timestamp: timestamp
  };
  await api("PUT", "/api/events/"+id, ev);
  closeModal();
  await loadAll();
  render();
}

function editEvent(id) {
  var e = state.events.find(function(ev){return ev.id===id});
  if (!e) return;
  showEventModal(e.filler, e.startTime, e.stopTime, e, null);
}

async function deleteEvent(id) {
  if (!confirm("Delete this event?")) return;
  await api("DELETE", "/api/events/"+id);
  await loadAll();
  render();
}

function closeModal() {
  document.getElementById("modal-root").innerHTML = "";
}

// ═══════════════════════════════════════
// ADD/EDIT PART MODAL
// ═══════════════════════════════════════
function showAddPartModal(existingPart) {
  var isEdit = !!existingPart;
  var p = existingPart || {};
  var html = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">';
  html += '<div class="modal">';
  html += '<div style="font-size:17px;font-weight:700;margin-bottom:16px">'+(isEdit?'Edit Part':'Add New Part')+'</div>';

  if (isEdit && p.photoFilename) {
    html += '<img src="/photos/'+esc(p.photoFilename)+'" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-bottom:14px">';
  }

  html += '<div style="margin-bottom:12px"><label class="label">Part Name *</label><input class="input" id="part-name" value="'+esc(p.name||"")+'"></div>';
  html += '<div style="margin-bottom:12px"><label class="label">Part Number</label><input class="input" id="part-number" value="'+esc(p.partNumber||"")+'"></div>';
  html += '<div style="margin-bottom:12px"><label class="label">Description / Notes</label><textarea class="textarea" id="part-desc">'+(esc(p.description||""))+'</textarea></div>';
  html += '<div style="margin-bottom:12px"><label class="label">Supplier / Vendor</label><input class="input" id="part-supplier" value="'+esc(p.supplier||"")+'"></div>';
  html += '<div style="margin-bottom:12px"><label class="label">Location (bin / shelf #)</label><input class="input" id="part-location" value="'+esc(p.location||"")+'"></div>';
  html += '<div style="margin-bottom:16px"><label class="label">Photo</label>';
  html += '<input type="file" accept="image/*" capture="environment" id="part-photo" style="color:var(--tx);font-size:13px;margin-top:4px">';
  html += '</div>';

  html += '<div style="display:flex;gap:10px">';
  html += '<button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>';
  if (isEdit) {
    html += '<button class="btn btn-primary" style="flex:1" onclick="saveEditedPart(\''+p.id+'\')">Update Part</button>';
  } else {
    html += '<button class="btn btn-primary" style="flex:1" onclick="saveNewPart()">Save Part</button>';
  }
  html += '</div></div></div>';
  document.getElementById("modal-root").innerHTML = html;
}

function showEditPartModal(id) {
  var p = state.catalog.find(function(x){return x.id===id});
  if (p) showAddPartModal(p);
}

async function saveNewPart() {
  var name = document.getElementById("part-name").value.trim();
  if (!name) return alert("Part name is required");
  var id = uid();
  await api("POST", "/api/catalog", {
    id: id, name: name,
    partNumber: document.getElementById("part-number").value.trim(),
    description: document.getElementById("part-desc").value.trim(),
    supplier: document.getElementById("part-supplier").value.trim(),
    location: document.getElementById("part-location").value.trim()
  });
  // Upload photo if selected
  var fileInput = document.getElementById("part-photo");
  if (fileInput.files.length > 0) {
    var formData = new FormData();
    formData.append("photo", fileInput.files[0]);
    await fetch(API+"/api/catalog/"+id+"/photo", {method:"POST", body:formData});
  }
  closeModal();
  await loadAll();
  render();
}

async function saveEditedPart(id) {
  var name = document.getElementById("part-name").value.trim();
  if (!name) return alert("Part name is required");
  await api("PUT", "/api/catalog/"+id, {
    name: name,
    partNumber: document.getElementById("part-number").value.trim(),
    description: document.getElementById("part-desc").value.trim(),
    supplier: document.getElementById("part-supplier").value.trim(),
    location: document.getElementById("part-location").value.trim()
  });
  var fileInput = document.getElementById("part-photo");
  if (fileInput.files.length > 0) {
    var formData = new FormData();
    formData.append("photo", fileInput.files[0]);
    await fetch(API+"/api/catalog/"+id+"/photo", {method:"POST", body:formData});
  }
  closeModal();
  await loadAll();
  render();
}

async function deleteCatalogPart(id) {
  if (!confirm("Delete this part from the catalog?")) return;
  await api("DELETE", "/api/catalog/"+id);
  await loadAll();
  render();
}

// TECHNICIANS MANAGEMENT
// ═══════════════════════════════════════
function renderTechnicians(el) {
  var html = '<div class="card">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  html += '<div style="font-size:15px;font-weight:700">Manage Technicians</div>';
  html += '<div style="font-size:12px;color:var(--td)">'+state.technicians.length+' techs</div></div>';
  html += '<p style="color:var(--td);font-size:13px;margin-bottom:16px">Add or remove technicians who respond to downtime calls. These names appear as selectable options on the filler cards and in the event detail form.</p>';

  // Add new tech
  html += '<div style="display:flex;gap:8px;margin-bottom:18px">';
  html += '<input class="input" style="flex:1" id="new-tech-name" placeholder="Enter technician name..." onkeydown="if(event.key===\'Enter\')addTechnician()">';
  html += '<button class="btn btn-primary" style="width:auto;padding:10px 16px;white-space:nowrap" onclick="addTechnician()">+ Add</button>';

      html += '<div class="tech-manage-name">'+esc(tc.name)+'</div>';
      html += '<button class="btn btn-delete btn-sm" style="width:auto;flex:none" onclick="deleteTechnician(\''+tc.id+'\')">✕ Remove</button>';
      html += '</div>';
    });

  html += '</div>';
  el.innerHTML = html;
}

async function addTechnician() {
  var input = document.getElementById("new-tech-name");
  var name = input.value.trim();
  if (!name) return;
  var result = await api("POST", "/api/technicians", {name: name});
  if (result.error) { alert(result.error); return; }
  input.value = "";
  await loadAll();
  render();
}

async function deleteTechnician(id) {
  var tech = state.technicians.find(function(t){return t.id===id});
  var name = tech ? tech.name : "this technician";
  if (!confirm("Remove "+name+"? They will be removed from future selections but past events will keep their name.")) return;
  await api("DELETE", "/api/technicians/"+id);
  await loadAll();
  render();
}

// ═══════════════════════════════════════
// PDF GENERATION
// ═══════════════════════════════════════
function printReport() { printPDF(state.events.filter(function(e){return e.date===today()}), today(), state.shiftLabel); }
function printReportForDate(d) { printPDF(state.events.filter(function(e){return e.date===d}), d, ""); }

function printPDF(evts, date, shift) {
  var total = evts.reduce(function(s,e){return s+(e.durationMin||0)},0);
  var ap = [];
  evts.forEach(function(e){(e.parts||[]).forEach(function(p){ap.push({name:p.name,pn:p.partNumber,qty:p.qty,filler:e.filler,eq:e.equipmentId})})});
  var h = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Shift Notes '+date+'</title><style>';
  h += '@page{size:letter;margin:.55in}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,Arial,sans-serif;font-size:10.5pt;color:#1a1a1a;line-height:1.35}';
  h += '.hdr{border-bottom:3px solid #222;padding-bottom:10px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:flex-end}.hdr h1{font-size:19pt;font-weight:800}';
  h += '.m{text-align:right;font-size:9.5pt;color:#555}.r3{display:flex;gap:14px;margin-bottom:14px}.sb{background:#f3f3f3;border-radius:5px;padding:9px 14px;flex:1;text-align:center}';
  h += '.sb .v{font-size:16pt;font-weight:800}.sb .l{font-size:7.5pt;text-transform:uppercase;letter-spacing:1px;color:#666}';
  h += '.sec{font-size:11pt;font-weight:700;margin:13px 0 6px;border-left:4px solid #e89832;padding-left:8px}';
  h += 'table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:9.5pt}th{background:#222;color:#fff;padding:5px 7px;text-align:left;font-size:7.5pt;text-transform:uppercase;letter-spacing:.5px}';
  h += 'td{padding:5px 7px;border-bottom:1px solid #ddd;vertical-align:top}tr:nth-child(even) td{background:#fafafa}';
  h += '.sg{margin-top:30px;display:flex;gap:32px}.sg div{flex:1;border-top:1px solid #333;padding-top:5px;font-size:8.5pt;color:#555}';
  h += '.ft{margin-top:18px;border-top:1px solid #ccc;padding-top:8px;font-size:8pt;color:#888;display:flex;justify-content:space-between}';
  h += '@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body>';
  h += '<div class="hdr"><div><h1>SHIFT NOTES</h1><div style="font-size:9.5pt;color:#555;margin-top:2px">Maintenance — Downtime Report</div></div>';
  h += '<div class="m"><div style="font-size:13pt;font-weight:700">'+date+'</div><div>'+(shift||'Shift Report')+'</div></div></div>';
  h += '<div class="r3"><div class="sb"><div class="v">'+evts.length+'</div><div class="l">Events</div></div>';
  h += '<div class="sb"><div class="v">'+durText(total)+'</div><div class="l">Total Downtime</div></div>';
  h += '<div class="sb"><div class="v">'+ap.length+'</div><div class="l">Parts Used</div></div></div>';
  h += '<div class="sec">Downtime Events</div>';
  h += '<table><thead><tr><th>#</th><th>Filler</th><th>Responded</th><th>Equipment</th><th>Start</th><th>Stop</th><th>Duration</th><th>Issue</th><th>Resolution</th><th>Parts</th></tr></thead><tbody>';
  evts.forEach(function(e,i){
    var pts=(e.parts||[]).map(function(p){var s=p.name;if(p.partNumber)s+=" ("+p.partNumber+")";if(p.qty>1)s+=" x"+p.qty;return s}).join(", ")||"None";
    var techNames=(e.techs||[]).map(function(t){return t.name}).join(", ")||"—";
    h+='<tr><td>'+(i+1)+'</td><td><b>'+e.filler+'</b></td><td>'+techNames+'</td><td>'+(e.equipmentId||"—")+'</td>';
    h+='<td>'+shortTime(e.startTime)+'</td><td>'+shortTime(e.stopTime)+'</td>';
    h+='<td>'+durText(e.durationMin)+'</td><td>'+(e.issue||"—")+'</td><td>'+(e.resolution||"—")+'</td><td>'+pts+'</td></tr>';
  });
  h += '</tbody></table>';
  if(ap.length>0){
    h+='<div class="sec">Parts Summary</div><table><thead><tr><th>Part</th><th>Part #</th><th>Qty</th><th>Filler</th><th>Equipment</th></tr></thead><tbody>';
    ap.forEach(function(p){h+='<tr><td>'+p.name+'</td><td>'+(p.pn||"—")+'</td><td>'+(p.qty||1)+'</td><td>'+p.filler+'</td><td>'+(p.eq||"—")+'</td></tr>'});
    h+='</tbody></table>';
  }
  h+='<div class="sg"><div>Technician Signature</div><div>Supervisor Signature</div><div>Date</div></div>';
  h+='<div class="ft"><span>Generated '+new Date().toLocaleString()+'</span><span>Maintenance Downtime Tracker</span></div></body></html>';
  var w=window.open(URL.createObjectURL(new Blob([h],{type:"text/html"})),"_blank");
  if(w)setTimeout(function(){w.print()},600);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
loadAll().then(render);
</script>
