<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0e12">
<title>Maintenance Tracker</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0e12;--sf:#151920;--sa:#1c2029;--ra:#232833;--bd:#2a2f3a;
  --ac:#e89832;--rd:#e05545;--gn:#38b060;--bl:#4090e0;
  --tx:#dce0e8;--td:#7a8090;--tm:#4a5060;--wh:#fff;
  --mono:'JetBrains Mono','Fira Code','SF Mono',monospace;
  --sans:'DM Sans','Segoe UI',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;-webkit-tap-highlight-color:transparent;position:relative}
body::before{content:"";position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:70vmin;height:70vmin;background:url("/icon-512.png") center/contain no-repeat;opacity:0.08;pointer-events:none;z-index:0}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

.header{background:var(--sf);border-bottom:2px solid var(--ac);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;border-radius:8px;object-fit:cover}
.logo-title{font-size:17px;font-weight:700}
.logo-sub{font-size:10px;color:var(--td);font-family:var(--mono);letter-spacing:1.2px;text-transform:uppercase}

.tabs{display:flex;gap:3px;background:var(--sa);border-radius:7px;padding:3px;flex-wrap:wrap}
.tab{padding:7px 12px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--sans);background:transparent;color:var(--td);transition:all .2s;position:relative}
.tab.active{background:var(--ac);color:#111}
.tab .dot{position:absolute;top:2px;right:2px;width:7px;height:7px;border-radius:50%;background:var(--rd);border:2px solid var(--sa)}

.main{flex:1;padding:16px;max-width:1200px;width:100%;margin:0 auto;position:relative;z-index:1}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:14px}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:600px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:12px;text-align:center}
.stat-val{font-size:20px;font-weight:800;font-family:var(--mono)}
.stat-label{font-size:10px;color:var(--td);font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}

.filler-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}
.filler-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px;display:flex;flex-direction:column;align-items:center;transition:all .3s}
.filler-card.running{box-shadow:0 0 20px rgba(255,255,255,.05)}
.filler-icon{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;font-family:var(--mono);margin-bottom:6px;transition:all .3s}
.filler-name{font-size:13px;font-weight:700;margin-bottom:4px}
.filler-timer{font-family:var(--mono);font-size:20px;font-weight:800;margin-bottom:2px;letter-spacing:1px}
.filler-since{font-size:10px;color:var(--td);font-family:var(--mono);margin-bottom:8px}
.filler-pulse{width:100%;height:3px;border-radius:2px;background:var(--sa);margin-top:8px;overflow:hidden}
.filler-pulse-bar{height:100%;border-radius:2px;animation:pulse 1.5s ease-in-out infinite;width:100%;opacity:.7}

.btn{padding:10px 18px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--sans);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;width:100%}
.btn-start{background:var(--gn);color:var(--wh)}
.btn-stop{background:var(--rd);color:var(--wh)}
.btn-edit{background:var(--bl);color:var(--wh)}
.btn-delete{background:var(--rd);color:var(--wh)}
.btn-primary{background:var(--ac);color:#111}
.btn-ghost{background:var(--sa);color:var(--td)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:5px}

.event-card{background:var(--sa);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:10px}
.event-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.event-field{margin-bottom:5px;font-size:13px}
.event-field-label{font-size:11px;color:var(--td);font-family:var(--mono);text-transform:uppercase}
.event-actions{display:flex;gap:8px;margin-top:10px;border-top:1px solid var(--bd);padding-top:10px}

.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;font-family:var(--mono)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--mono);margin-right:4px}

.input{width:100%;padding:10px 12px;background:var(--sa);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:14px;font-family:var(--sans);outline:none;box-sizing:border-box;text-transform:uppercase}
.input:focus{border-color:var(--ac)}
.textarea{width:100%;padding:10px 12px;background:var(--sa);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:14px;font-family:var(--sans);outline:none;box-sizing:border-box;min-height:70px;resize:vertical;text-transform:uppercase}
.label{font-size:11px;font-weight:600;color:var(--td);margin-bottom:4px;display:block;font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:12px;width:100%;max-width:560px;padding:20px;margin:auto 0}

.section-title{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}

.part-card{background:var(--sa);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:10px}
.part-photo{width:100%;max-height:120px;object-fit:cover;border-radius:6px;margin-bottom:10px}
.part-info{margin-bottom:4px;font-size:13px}

.empty{text-align:center;padding:36px;color:var(--td);font-size:14px}
.hidden{display:none}

.tech-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;margin-bottom:6px}
.tech-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid var(--bd);background:var(--sa);color:var(--td)}
.tech-chip.selected{background:#4090e030;color:#4090e0;border-color:#4090e050}
.tech-chip.display{cursor:default;background:#4090e020;color:#4090e0;border:none;font-size:10px;padding:2px 8px}
.tech-manage-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--bd)}
.tech-manage-name{flex:1;font-size:15px;font-weight:600}
.identity-modal{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.identity-box{background:var(--sf);border:2px solid var(--ac);border-radius:16px;width:100%;max-width:380px;padding:28px;text-align:center;margin:auto 0}
.login-error{background:var(--rd)15;border:1px solid var(--rd)40;color:var(--rd);padding:10px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
.login-field{margin-bottom:14px;text-align:left}
.identity-avatar{width:60px;height:60px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;font-family:var(--mono)}
.identity-name-btn{width:100%;padding:14px;border:1px solid var(--bd);border-radius:8px;background:var(--sa);color:var(--tx);font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer;margin-bottom:8px;transition:all .15s;text-align:left;display:flex;align-items:center;gap:12px}
.identity-name-btn:hover,.identity-name-btn:active{border-color:var(--ac);background:var(--ac)10}
.identity-current{border-color:var(--ac);background:var(--ac)15}
.identity-initial{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;font-family:var(--mono);flex-shrink:0}
.logged-in-bar{background:var(--sa);border-bottom:1px solid var(--bd);padding:6px 16px;display:flex;align-items:center;justify-content:space-between;font-size:12px;z-index:49}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="/icon-192.png" class="logo-icon" alt="MT">
    <div>
      <div class="logo-title">Maintenance Tracker</div>
      <div class="logo-sub">Downtime • Parts • Shift Notes</div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="logged-in-bar" id="logged-in-bar"></div>

<div class="main" id="main"></div>

<!-- Modal container -->
<div id="modal-root"></div>
<!-- Identity modal -->
<div id="identity-root"></div>

<script>
// ═══════════════════════════════════════
// CONFIG & HELPERS
// ═══════════════════════════════════════
var API = "";
var FILLERS = ["A Line","B Line","C Line","F Line","G Line","H Line","J Line","K Line","M Line","R Line"];
var FILLER_COLORS = {"A Line":"#e05545","B Line":"#e08840","C Line":"#d4b030","F Line":"#58b050","G Line":"#38a8a0","H Line":"#4090e0","J Line":"#6870d8","K Line":"#a060c8","M Line":"#d060a0","R Line":"#e06878"};
var TAB_NAMES = ["Dashboard","Today's Log","Parts Catalog","Shift Report","History","Technicians"];

var state = {
  tab: 0, events: [], timers: {}, catalog: [], equipment: [], technicians: [], partTypes: [],
  shiftLabel: "", historyDate: today(), searchPart: "", selectedTechs: {}, filterType: "",
  showOtherShifts: {},
  currentUser: null
};

// Load saved identity from this device
try {
  var saved = JSON.parse(localStorage.getItem("mt_current_user"));
  if (saved && saved.id) state.currentUser = saved;
} catch(e) {}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function today(){
  var d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function upper(s){return(s||"").toUpperCase()}
function shortTime(ts){if(!ts)return"—";var n=typeof ts==="string"?parseInt(ts):ts;if(!n||isNaN(n))return"—";return new Date(n).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
function timerDisp(ms){if(!ms||ms<0)return"0:00";var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;if(h>0)return h+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");return m+":"+String(sec).padStart(2,"0")}
function durText(n){if(!n&&n!==0)return"—";var h=Math.floor(n/60),m=Math.round(n%60);return h>0?h+"h "+m+"m":m+"m"}
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}

function getCurrentShift() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var mins = h * 60 + m;
  // 1st: 7:00 (420) - 15:30 (930)
  // 2nd: 15:00 (900) - 23:30 (1410)
  // 3rd: 23:30 (1410) - 7:30 (450) next day
  // With overlaps:
  // 7:00-7:30 = 1st + 3rd overlap
  // 15:00-15:30 = 1st + 2nd overlap
  // 23:00-23:30 = 2nd + 3rd overlap
  var shifts = [];
  if (mins >= 420 && mins < 930) shifts.push("1st");
  if (mins >= 900 && mins < 1410) shifts.push("2nd");
  if (mins >= 1410 || mins < 450) shifts.push("3rd");
  // During overlaps, both shifts are included
  if (shifts.length === 0) shifts.push("1st");
  return shifts;
}

function getCurrentShiftLabel() {
  var shifts = getCurrentShift();
  return shifts.map(function(s){return s+" Shift"}).join(" / ");
}

function getTechsForCurrentShift() {
  var shifts = getCurrentShift();
  return state.technicians.filter(function(t) {
    return shifts.indexOf(t.shift || "1st") >= 0;
  });
}

function getTechsNotOnShift() {
  var shifts = getCurrentShift();
  return state.technicians.filter(function(t) {
    return shifts.indexOf(t.shift || "1st") < 0;
  });
}

// ═══════════════════════════════════════
// API CALLS
// ═══════════════════════════════════════
async function api(method, path, body) {
  var opts = { method: method, headers: {"Content-Type":"application/json"} };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(API + path, opts);
  return res.json();
}

async function loadAll() {
  var results = await Promise.all([
    api("GET","/api/events"),
    api("GET","/api/timers"),
    api("GET","/api/catalog"),
    api("GET","/api/equipment"),
    api("GET","/api/technicians"),
    api("GET","/api/part-types")
  ]);
  state.events = results[0].map(function(e){
    return {id:e.id,filler:e.filler,equipmentId:e.equipment_id,issue:e.issue,resolution:e.resolution,
      startTime:parseInt(e.start_time)||0,stopTime:parseInt(e.stop_time)||0,durationMin:parseInt(e.duration_min)||0,date:e.date,timestamp:e.timestamp,
      workOrder:e.work_order||"",timeEditReason:e.time_edit_reason||"",startedBy:e.started_by||"",
      parts:(e.parts||[]).map(function(p){return{id:p.id,name:p.name,partNumber:p.part_number,qty:parseInt(p.qty)||1,partType:p.part_type||""}}),
      techs:e.techs||[],
      photos:e.photos||[]};
  });
  state.timers = results[1];
  state.catalog = results[2].map(function(p){
    return {id:p.id,name:p.name,partNumber:p.part_number,description:p.description,supplier:p.supplier,
      location:p.location,photoFilename:p.photo_filename,usageCount:p.usage_count,lastUsed:p.last_used,
      partType:p.part_type||"",fillersUsed:p.fillersUsed||[],equipmentUsed:p.equipmentUsed||[]};
  });
  state.equipment = results[3];
  state.technicians = results[4];
  state.partTypes = results[5];
}

// ═══════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════
function render() {
  renderTabs();
  var main = document.getElementById("main");
  if (state.tab === 0) renderDashboard(main);
  else if (state.tab === 1) renderTodayLog(main);
  else if (state.tab === 2) renderCatalog(main);
  else if (state.tab === 3) renderShiftReport(main);
  else if (state.tab === 4) renderHistory(main);
  else if (state.tab === 5) renderTechnicians(main);
}

function renderTabs() {
  var active = Object.values(state.timers).filter(function(t){return t.running}).length;
  var html = "";
  TAB_NAMES.forEach(function(name, i) {
    html += '<button class="tab'+(state.tab===i?" active":"")+'" onclick="setTab('+i+')">'+name;
    if (i===0 && active>0) html += '<span class="dot"></span>';
    html += '</button>';
  });
  document.getElementById("tabs").innerHTML = html;
}

function setTab(i){state.tab=i;render()}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════
var timerInterval = null;

function renderDashboard(el) {
  var todayEvts = state.events.filter(function(e){return e.date===today()});
  var totalDown = todayEvts.reduce(function(s,e){return s+(e.durationMin||0)},0);
  var active = Object.values(state.timers).filter(function(t){return t.running}).length;

  var html = '<div style="text-align:center;margin-bottom:12px;font-size:12px;color:var(--td);font-family:var(--mono)">Current: <strong style="color:var(--ac)">'+getCurrentShiftLabel()+'</strong></div>';
  html += '<div class="stat-grid">';
  html += statBox(active, "Active Timers", active>0?"var(--rd)":"var(--tm)");
  html += statBox(todayEvts.length, "Events Today", "var(--ac)");
  html += statBox(durText(totalDown), "Total Downtime", "var(--ac)");
  html += statBox(state.catalog.length, "Parts Tracked", "var(--td)");
  html += '</div>';

  html += '<div class="section-title"><span style="color:var(--ac)">▣</span> Line Status Board</div>';
  html += '<div class="filler-grid">';
  FILLERS.forEach(function(f) {
    var t = state.timers[f];
    var on = t && t.running;
    var color = FILLER_COLORS[f];
    var elapsed = on ? Date.now() - t.startTime : 0;
    var selectedForFiller = state.selectedTechs[f] || [];
    var timerTechs = (on && t.techs) ? t.techs : [];

    html += '<div class="filler-card'+(on?" running":"")+'" style="border-color:'+(on?color+"60":"var(--bd)")+'">';
    html += '<div class="filler-icon" style="background:'+(on?color:color+"20")+';color:'+(on?"#fff":color)+'">'+f.charAt(0)+'</div>';
    html += '<div class="filler-name" style="color:'+(on?"var(--wh)":"var(--tx)")+'">'+f+'</div>';
    if (on) {
      html += '<div style="font-size:11px;font-weight:800;color:var(--rd);font-family:var(--mono);letter-spacing:1px;margin-bottom:4px">● DOWN</div>';
      html += '<div class="filler-timer" data-filler="'+f+'" style="color:'+color+'">'+timerDisp(elapsed)+'</div>';
      html += '<div class="filler-since">since '+shortTime(t.startTime)+'</div>';
      // Show who started the call
      if (t.startedBy) {
        html += '<div style="font-size:9px;color:var(--ac);font-family:var(--mono);margin-bottom:4px">STARTED BY: '+esc(t.startedBy)+'</div>';
      }
      // Show who's responding as simple text
      if (timerTechs.length > 0) {
        html += '<div style="font-size:10px;color:var(--td);margin-bottom:6px;text-align:center">'+timerTechs.map(function(tc){return esc(tc.name)}).join(", ")+'</div>';
      }
      // Check if current user is already on this call
      var userOnCall = state.currentUser && timerTechs.some(function(tc){return tc.id === state.currentUser.id});
      html += '<div style="display:flex;gap:6px;width:100%;flex-wrap:wrap">';
      if (!userOnCall) {
        html += '<button class="btn btn-primary btn-sm" style="flex:1;padding:8px 0;min-width:60px" onclick="joinCall(\''+f+'\')">+ Join</button>';
      } else {
        html += '<button class="btn btn-ghost btn-sm" style="flex:1;padding:8px 0;min-width:60px;color:var(--ac);border:1px solid var(--ac)30" onclick="leaveCall(\''+f+'\')">Leave</button>';
      }
      html += '<button class="btn btn-stop" style="flex:1;padding:8px 0;min-width:60px" onclick="stopFiller(\''+f+'\')"><span style="width:8px;height:8px;border-radius:2px;background:#fff;display:inline-block"></span> STOP</button>';
      html += '</div>';
      html += '<div class="filler-pulse"><div class="filler-pulse-bar" style="background:'+color+'"></div></div>';
    } else {
      html += '<div class="filler-timer" style="color:var(--tm)">—:——</div>';
      html += '<div style="font-size:11px;font-weight:800;color:var(--gn);font-family:var(--mono);letter-spacing:1px;margin-bottom:8px">● Running</div>';
      html += '<button class="btn btn-start" onclick="startFiller(\''+f+'\')"><span style="width:0;height:0;border-left:8px solid white;border-top:5px solid transparent;border-bottom:5px solid transparent;display:inline-block"></span> START</button>';
    }
    html += '</div>';
  });
  html += '</div>';

  // Recent events
  if (todayEvts.length > 0) {
    html += '<div class="card" style="margin-top:16px"><div class="section-title">Recent Events Today</div>';
    todayEvts.slice(0,5).forEach(function(e){html += eventCardHTML(e, true)});
    html += '</div>';
  }

  el.innerHTML = html;
  startTimerTick();
}

function statBox(val, label, color) {
  return '<div class="stat"><div class="stat-val" style="color:'+color+'">'+val+'</div><div class="stat-label">'+label+'</div></div>';
}

function startTimerTick() {
  if (timerInterval) clearInterval(timerInterval);
  var hasRunning = Object.values(state.timers).some(function(t){return t.running});
  if (!hasRunning) return;
  timerInterval = setInterval(function() {
    FILLERS.forEach(function(f) {
      var t = state.timers[f];
      if (!t || !t.running) return;
      var el = document.querySelector('[data-filler="'+f+'"]');
      if (el) el.textContent = timerDisp(Date.now() - t.startTime);
    });
  }, 1000);
}

function toggleFillerTech(filler, techId) {
  if (!state.selectedTechs[filler]) state.selectedTechs[filler] = [];
  var arr = state.selectedTechs[filler];
  var idx = arr.indexOf(techId);
  if (idx >= 0) { arr.splice(idx, 1); }
  else { arr.push(techId); }
  render();
}

function toggleOtherShifts(key) {
  state.showOtherShifts[key] = !state.showOtherShifts[key];
  render();
}

async function startFiller(f) {
  var techIds = (state.selectedTechs[f] || []).slice();
  // Auto-include current user if not already selected
  if (state.currentUser && techIds.indexOf(state.currentUser.id) < 0) {
    techIds.push(state.currentUser.id);
  }
  var startedBy = state.currentUser ? state.currentUser.name : null;
  var result = await api("POST","/api/timers/"+encodeURIComponent(f)+"/start", {techIds: techIds, startedBy: startedBy});
  state.timers[f] = result;
  state.selectedTechs[f] = [];
  await loadAll();
  render();
}

async function stopFiller(f) {
  // Save local start time before the API call in case server lost it
  var localTimer = state.timers[f];
  var localStartTime = localTimer ? localTimer.startTime : null;
  
  var result = await api("POST","/api/timers/"+encodeURIComponent(f)+"/stop");
  
  // Use server start time, fall back to local, fall back to now
  var startTime = result.startTime || localStartTime || Date.now();
  var stopTime = result.stopTime || Date.now();
  
  // Sanity check: if duration is negative or over 24 hours, something went wrong
  var durationMs = stopTime - startTime;
  if (durationMs < 0 || durationMs > 86400000) {
    alert("Warning: Timer data may be incorrect. Start time: " + shortTime(startTime) + ". Please verify and edit times if needed.");
    // Cap at a reasonable default so we don't get 492851 hours
    if (durationMs < 0) startTime = stopTime;
    if (durationMs > 86400000) startTime = stopTime - 3600000; // default to 1 hour
  }
  
  showEventModal(f, startTime, stopTime, null, result.techIds || [], result.startedBy || null);
}

async function joinCall(f) {
  var joinIds = (state.selectedTechs["join_"+f] || []).slice();
  // Auto-include current user if not already on call or selected
  if (state.currentUser && joinIds.indexOf(state.currentUser.id) < 0) {
    var alreadyOnCall = (state.timers[f] && state.timers[f].techs || []).some(function(t) { return t.id === state.currentUser.id; });
    if (!alreadyOnCall) joinIds.push(state.currentUser.id);
  }
  if (joinIds.length === 0) return;
  await api("POST","/api/timers/"+encodeURIComponent(f)+"/join", {techIds: joinIds});
  state.selectedTechs["join_"+f] = [];
  await loadAll();
  render();
}

async function leaveCall(f) {
  if (!state.currentUser) return;
  if (!confirm("Leave this call? The timer will keep running for other techs.")) return;
  await api("POST","/api/timers/"+encodeURIComponent(f)+"/leave", {techId: state.currentUser.id});
  await loadAll();
  render();
}

  // Re-render the tech chips
  var container = document.getElementById("modal-techs");
  if (container) {
    var html = "";

function recalcModalDuration() {
  var startInput = document.getElementById("modal-start-time");
  var stopInput = document.getElementById("modal-stop-time");
  var durDisplay = document.getElementById("modal-dur-display");
  if (!startInput || !stopInput || !durDisplay) return;
  var sp = startInput.value.split(":");
  var ep = stopInput.value.split(":");
  var startMins = parseInt(sp[0])*60 + parseInt(sp[1]);
  var stopMins = parseInt(ep[0])*60 + parseInt(ep[1]);
  var diff = stopMins - startMins;
  if (diff < 0) diff += 24*60;
  durDisplay.textContent = durText(diff);
}

function getModalTimes(origStart, origStop, isEdit) {
  if (!isEdit) return { startTime: origStart, stopTime: origStop, durationMin: Math.round((origStop - origStart)/60000) };
  var startInput = document.getElementById("modal-start-time");
  var stopInput = document.getElementById("modal-stop-time");
  if (!startInput || !stopInput) return { startTime: origStart, stopTime: origStop, durationMin: Math.round((origStop - origStart)/60000) };

  var origDate = new Date(origStart);
  var sp = startInput.value.split(":");
  var ep = stopInput.value.split(":");
  var newStart = new Date(origDate.getFullYear(), origDate.getMonth(), origDate.getDate(), parseInt(sp[0]), parseInt(sp[1])).getTime();
  var newStop = new Date(origDate.getFullYear(), origDate.getMonth(), origDate.getDate(), parseInt(ep[0]), parseInt(ep[1])).getTime();
  if (newStop < newStart) newStop += 24*60*60*1000;
  var durationMin = Math.round((newStop - newStart)/60000);
  return { startTime: newStart, stopTime: newStop, durationMin: durationMin };
}

async function saveEditedEvent(id, filler, startTime, stopTime, durMins, date, timestamp) {
  if (isSaving) return;

  // Build original HH:MM strings the same way we set the input values
  var origStartDate = new Date(startTime);
  var origStopDate = new Date(stopTime);
  var origStartHHMM = String(origStartDate.getHours()).padStart(2,"0") + ":" + String(origStartDate.getMinutes()).padStart(2,"0");
  var origStopHHMM = String(origStopDate.getHours()).padStart(2,"0") + ":" + String(origStopDate.getMinutes()).padStart(2,"0");
  
  // Read current input values
  var startInput = document.getElementById("modal-start-time");
  var stopInput = document.getElementById("modal-stop-time");
  var currentStartHHMM = startInput ? startInput.value : origStartHHMM;
  var currentStopHHMM = stopInput ? stopInput.value : origStopHHMM;
  
  // Only consider times changed if the HH:MM strings actually differ
  var timesChanged = (currentStartHHMM !== origStartHHMM || currentStopHHMM !== origStopHHMM);
  
  var times;
  if (timesChanged) {
    times = getModalTimes(startTime, stopTime, true);
  } else {
    // Keep original timestamps exactly as they were
    times = { startTime: startTime, stopTime: stopTime, durationMin: durMins };
  }
  
  var reason = "";
  if (timesChanged) {
    var reasonInput = document.getElementById("modal-time-reason");
    reason = reasonInput ? reasonInput.value.trim() : "";
    if (!reason) {
      alert("You changed the start or stop time. Please enter a reason for the time change.");
      if (reasonInput) reasonInput.focus();
      return;
    }
  }

  isSaving = true;
  var saveBtn = document.querySelector(".modal .btn-primary");
  if (saveBtn) { saveBtn.textContent = "Saving..."; saveBtn.style.opacity = "0.6"; }

  try {
    var ev = {
      id: id, filler: filler,

      workOrder: upper(document.getElementById("modal-wo").value.trim()),
      issue: upper(document.getElementById("modal-issue").value.trim()),

    };
    await api("PUT", "/api/events/"+id, ev);

  } finally {

  }
}

function compressImage(file, maxWidth, quality) {
  return new Promise(function(resolve) {
    if (file.size < 200000) { resolve(file); return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement("canvas");
        var w = img.width;
        var h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w;
        canvas.height = h;
        var ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        canvas.toBlob(function(blob) {
          resolve(new File([blob], file.name, { type: "image/jpeg" }));
        }, "image/jpeg", quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

        html += '<select class="input" style="width:auto;min-width:80px;padding:4px 8px;font-size:11px" onchange="changeTechShift(\''+tc.id+'\',this.value)">';
        SHIFTS.forEach(function(s) { html += '<option value="'+s+'">'+s+'</option>'; });
        html += '</select>';
        html += '<button class="btn btn-delete btn-sm" style="width:auto;flex:none" onclick="deleteTechnician(\''+tc.id+'\')">✕</button>';
        html += '</div>';
      });
      html += '</div>';
    }
  }
  html += '</div>';
  el.innerHTML = html;
}

async function addTechnician() {
  var input = document.getElementById("new-tech-name");
  var shiftSel = document.getElementById("new-tech-shift");
  var name = input.value.trim();
  if (!name) return;
  var shift = shiftSel ? shiftSel.value : "1st";
  var result = await api("POST", "/api/technicians", {name: upper(name), shift: shift});
  if (result.error) { alert(result.error); return; }
  input.value = "";
  await loadAll();
  render();
}

async function changeTechShift(id, shift) {
  await api("PUT", "/api/technicians/"+id, {shift: shift});
  await loadAll();
  render();
}

async function deleteTechnician(id) {
  var tech = state.technicians.find(function(t){return t.id===id});
  var name = tech ? tech.name : "this technician";
  if (!confirm("Remove "+name+"?")) return;
  await api("DELETE", "/api/technicians/"+id);
  await loadAll();
  render();
}

function printReport() { printPDF(state.events.filter(function(e){return e.date===today()}), today(), state.shiftLabel); }
function printReportForDate(d) { printPDF(state.events.filter(function(e){return e.date===d}), d, ""); }

  var ap = [];
  evts.forEach(function(e){(e.parts||[]).forEach(function(p){ap.push({name:p.name,pn:p.partNumber,qty:p.qty,filler:e.filler,eq:e.equipmentId})})});
  var h = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Shift Notes '+date+'</title><style>';
  h += '@page{size:letter;margin:.55in}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,Arial,sans-serif;font-size:10.5pt;color:#1a1a1a;line-height:1.35}';
  h += '.hdr{border-bottom:3px solid #222;padding-bottom:10px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:flex-end}.hdr h1{font-size:19pt;font-weight:800}';
  h += '.m{text-align:right;font-size:9.5pt;color:#555}.r3{display:flex;gap:14px;margin-bottom:14px}.sb{background:#f3f3f3;border-radius:5px;padding:9px 14px;flex:1;text-align:center}';
  h += '.sb .v{font-size:16pt;font-weight:800}.sb .l{font-size:7.5pt;text-transform:uppercase;letter-spacing:1px;color:#666}';
  h += '.sec{font-size:11pt;font-weight:700;margin:13px 0 6px;border-left:4px solid #e89832;padding-left:8px}';
  h += 'table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:9.5pt}th{background:#222;color:#fff;padding:5px 7px;text-align:left;font-size:7.5pt;text-transform:uppercase;letter-spacing:.5px}';
  h += 'td{padding:5px 7px;border-bottom:1px solid #ddd;vertical-align:top}tr:nth-child(even) td{background:#fafafa}';
  h += '.sg{margin-top:30px;display:flex;gap:32px}.sg div{flex:1;border-top:1px solid #333;padding-top:5px;font-size:8.5pt;color:#555}';
  h += '.ft{margin-top:18px;border-top:1px solid #ccc;padding-top:8px;font-size:8pt;color:#888;display:flex;justify-content:space-between}';
  h += '@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body>';
  h += '<div class="hdr"><div><h1>SHIFT NOTES</h1><div style="font-size:9.5pt;color:#555;margin-top:2px">Maintenance — Downtime Report</div></div>';
  h += '<div class="m"><div style="font-size:13pt;font-weight:700">'+date+'</div><div>'+(shift||'Shift Report')+'</div></div></div>';
  h += '<div class="r3"><div class="sb"><div class="v">'+evts.length+'</div><div class="l">Events</div></div>';
  h += '<div class="sb"><div class="v">'+durText(total)+'</div><div class="l">Total Downtime</div></div>';
  h += '<div class="sb"><div class="v">'+ap.length+'</div><div class="l">Parts Used</div></div></div>';
  h += '<div class="sec">Downtime Events</div>';
  h += '<table><thead><tr><th>#</th><th>Line</th><th>Started By</th><th>Responded</th><th>Equipment</th><th>W.O.#</th><th>Start</th><th>Stop</th><th>Duration</th><th>Issue</th><th>Resolution</th><th>Parts</th></tr></thead><tbody>';
  evts.forEach(function(e,i){
    var pts=(e.parts||[]).map(function(p){var s=p.name;if(p.partNumber)s+=" ("+p.partNumber+")";if(p.qty>1)s+=" x"+p.qty;return s}).join(", ")||"None";
    var techNames=(e.techs||[]).map(function(t){return t.name}).join(", ")||"—";
    h+='<tr><td>'+(i+1)+'</td><td><b>'+e.filler+'</b></td><td>'+(e.startedBy||"—")+'</td><td>'+techNames+'</td><td>'+(e.equipmentId||"—")+'</td><td>'+(e.workOrder||"—")+'</td>';
    h+='<td>'+shortTime(e.startTime)+'</td><td>'+shortTime(e.stopTime)+'</td>';
    h+='<td>'+durText(e.durationMin)+'</td><td>'+(e.issue||"—")+'</td><td>'+(e.resolution||"—")+'</td><td>'+pts+'</td></tr>';
  });
  h += '</tbody></table>';
  if(ap.length>0){
    h+='<div class="sec">Parts Summary</div><table><thead><tr><th>Part</th><th>Part #</th><th>Qty</th><th>Filler</th><th>Equipment</th></tr></thead><tbody>';

function renderLoggedInBar() {
  var bar = document.getElementById("logged-in-bar");
  if (!bar) return;
  if (!state.currentUser) {
    bar.innerHTML = '<span style="color:var(--rd)">⚠ Not logged in</span><button onclick="showLoginScreen()" style="background:var(--ac);color:#111;border:none;border-radius:4px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans)">Log In</button>';
    return;
  }
  var shiftColors = {"1st":"#4090e0","2nd":"#e89832","3rd":"#a060c8"};
  var sc = shiftColors[state.currentUser.shift] || "var(--bl)";
  bar.innerHTML = '<div style="display:flex;align-items:center;gap:8px"><div style="width:22px;height:22px;border-radius:50%;background:'+sc+'30;color:'+sc+';display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;font-family:var(--mono)">'+esc((state.currentUser.name||"?").charAt(0))+'</div><span style="color:var(--tx);font-weight:600">'+esc(state.currentUser.name)+'</span><span class="tag" style="background:'+sc+'18;color:'+sc+'">'+(state.currentUser.shift||"")+' Shift</span></div><button onclick="logout()" style="background:transparent;color:var(--td);border:1px solid var(--bd);border-radius:4px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans)">Log Out</button>';
}

function showLoginScreen() {
  document.body.style.overflow = "hidden";
  var html = '<div class="identity-modal">';
  html += '<div class="identity-box">';
  html += '<img src="/icon-192.png" style="width:64px;height:64px;border-radius:14px;margin-bottom:14px">';
  html += '<div style="font-size:22px;font-weight:800;margin-bottom:4px">Maintenance Tracker</div>';
  html += '<div style="font-size:13px;color:var(--td);margin-bottom:24px">Log in to continue</div>';
  html += '<div id="login-error" class="login-error"></div>';

  // Name select dropdown
  html += '<div class="login-field">';
  html += '<label class="label">Select Your Name</label>';
  html += '<select class="input" id="login-name" style="font-size:15px;padding:12px">';
  html += '<option value="">— SELECT —</option>';
  var SHIFTS = ["1st","2nd","3rd"];
  SHIFTS.forEach(function(shift) {
    var techs = state.technicians.filter(function(t) { return (t.shift||"1st") === shift; });
    if (techs.length === 0) return;
    html += '<optgroup label="'+shift+' Shift">';
    techs.forEach(function(tc) {
      html += '<option value="'+esc(tc.name)+'">'+esc(tc.name)+'</option>';
    });
    html += '</optgroup>';
  });
  html += '</select></div>';

  // Password field
  html += '<div class="login-field">';
  html += '<label class="label">Password</label>';
  html += '<input class="input" type="password" id="login-password" placeholder="ENTER PASSWORD" style="font-size:15px;padding:12px;letter-spacing:2px" onkeydown="if(event.key===\'Enter\')doLogin()">';
  html += '</div>';

  // Login button
  html += '<button class="btn btn-primary" style="font-size:15px;padding:14px;margin-top:8px" id="login-btn" onclick="doLogin()">LOG IN</button>';

  html += '</div></div>';
  document.getElementById("identity-root").innerHTML = html;
}

async function doLogin() {
  var nameSelect = document.getElementById("login-name");
  var passInput = document.getElementById("login-password");
  var errorDiv = document.getElementById("login-error");
  var loginBtn = document.getElementById("login-btn");

  var name = nameSelect ? nameSelect.value : "";
  var password = passInput ? passInput.value : "";

  if (!name) {
    errorDiv.textContent = "Please select your name";
    errorDiv.style.display = "block";
    return;
  }
  if (!password) {
    errorDiv.textContent = "Please enter your password";
    errorDiv.style.display = "block";
    return;
  }

  loginBtn.textContent = "LOGGING IN...";
  loginBtn.style.opacity = "0.6";
  errorDiv.style.display = "none";

  try {
    var result = await api("POST", "/api/auth/login", { name: name, password: password });
    if (result.error) {
      errorDiv.textContent = result.error;
      errorDiv.style.display = "block";
      loginBtn.textContent = "LOG IN";
      loginBtn.style.opacity = "1";
      return;
    }
    state.currentUser = { id: result.id, name: result.name, shift: result.shift || "1st" };
    try { localStorage.setItem("mt_current_user", JSON.stringify(state.currentUser)); } catch(e) {}
    document.getElementById("identity-root").innerHTML = "";
    document.body.style.overflow = "";
    renderLoggedInBar();
    render();
  } catch (err) {
    errorDiv.textContent = "Login failed. Please try again.";
    errorDiv.style.display = "block";
    loginBtn.textContent = "LOG IN";
    loginBtn.style.opacity = "1";
  }
}

function logout() {
  state.currentUser = null;
  try { localStorage.removeItem("mt_current_user"); } catch(e) {}
  renderLoggedInBar();
  render();
  showLoginScreen();
}

// ═══════════════════════════════════════
// INIT + AUTO-REFRESH
// ═══════════════════════════════════════
loadAll().then(function() {
  // Verify saved user still exists
  if (state.currentUser) {
    var found = state.technicians.find(function(t) { return t.id === state.currentUser.id; });
    if (!found) {
      state.currentUser = null;
      try { localStorage.removeItem("mt_current_user"); } catch(e) {}
    }
  }
  renderLoggedInBar();
  render();
  // Show login screen if no user logged in
  if (!state.currentUser) {
    showLoginScreen();
  }
});

// Auto-refresh data every 10 seconds so all devices stay in sync
// Only refreshes data, doesn't re-render if a modal is open
var pollInterval = null;
function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async function() {
    // Don't refresh while modal is open, saving, or user is typing
    var modalOpen = document.getElementById("modal-root").innerHTML.length > 0;
    var identityOpen = document.getElementById("identity-root").innerHTML.length > 0;
    var activeEl = document.activeElement;
    var userTyping = activeEl && (activeEl.tagName === "INPUT" || activeEl.tagName === "TEXTAREA" || activeEl.tagName === "SELECT");
    if (modalOpen || identityOpen || isSaving || userTyping) return;
    try {
      await loadAll();
      render();
    } catch(e) {
      // silently fail — next poll will try again
    }
  }, 10000);
}
startPolling();

// Also refresh when tab becomes visible (user switches back to app)
document.addEventListener("visibilitychange", function() {
  if (!document.hidden) {
    var activeEl = document.activeElement;
    var userTyping = activeEl && (activeEl.tagName === "INPUT" || activeEl.tagName === "TEXTAREA" || activeEl.tagName === "SELECT");
    if (!userTyping) {
      loadAll().then(render);
    }
  }
});
</script>
